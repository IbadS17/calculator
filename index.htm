<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Calculator</title>
</head>
<body>
</body>
<h1 id="result">Result</h1>
    <div class="container">
        <input type="text" class="input" id="input1">
        <input type="text" class="input" id="input2">
        <table>
            <tr>
                <td><button class="btn btn1" onclick="add()">+</button></td>
                <td><button class="btn btn2" onclick="sub()">-</button></td>
                <td><button class="btn btn3" onclick="mult()">x</button></td>
                <td><button class="btn btn4" onclick="devide()">/</button></td>
            </tr>
            <tr>
                <td><button class="btn btn1">9</button></td>
                <td><button class="btn btn2">8</button></td>
                <td><button class="btn btn3">7</button></td>
                <td rowspan="4"><button class="btn btn4">=</button></td>
            </tr>
            <tr>
                <td><button class="btn btn1">6</button></td>
                <td><button class="btn btn2">5</button></td>
                <td><button class="btn btn3">4</button></td>
                <!-- <td><button class="btn btn4"></button></td> -->
            </tr>
            <tr>
                <td><button class="btn btn1">1</button></td>
                <td><button class="btn btn2">2</button></td>
                <td><button class="btn btn3">3</button></td>
                <!-- <td><button class="btn btn4"></button></td> -->
            </tr>
            <tr>
                <td><button class="btn btn1">0</button></td>
                <td><button class="btn btn2">.</button></td>
                <td><button class="btn btn3">C</button></td>
                <!-- <td><button class="btn btn4"></button></td> -->
            </tr>
        </table>
    </div>
</html>
